<!-- ═══════════════════════════════════════════
     components/navbar.html — IDF Kenya v3.1 (PATCHED)

     FIX 1: .menu-toggle  →  .hamburger-btn
             components.js initMobileMenu() queries '.hamburger-btn'
             The old class name meant the toggle never initialised.

     FIX 2: SVG line classes updated to match components.css animations:
             line-top    →  hamburger-line hamburger-line--top
             line-middle →  hamburger-line hamburger-line--mid
             line-bottom →  hamburger-line hamburger-line--bottom
             Without this the X-close animation never fired.
═══════════════════════════════════════════ -->

<header id="site-header" class="site-header" role="banner">
  <div class="nav-inner container">

    <!-- Logo -->
    <a href="index.html" class="logo logo--has-image" aria-label="IDF Kenya — Home">
      <picture class="logo__picture">
        <img
          src="assets/images/idf-logo.svg"
          alt="IDF Kenya Logo"
          class="logo__img"
          width="180"
          height="54"
          loading="eager"
          decoding="async"
          draggable="false"
        />
      </picture>
      <div class="logo__text">
        <span class="logo__primary">IDF</span>
        <span class="logo__full">Integrated Development Facility</span>
        <span class="logo__tagline">Kenya</span>
      </div>
      <!-- Shown only when the logo image fails to load -->
      <span class="logo__fallback" aria-hidden="true">
        <span class="logo__fallback-primary">IDF <span class="logo__accent">Kenya</span></span>
        <span class="logo__fallback-tag">Integrated Development Facility</span>
      </span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav" aria-label="Main navigation">
      <a href="index.html"     class="nav-link" data-page="index.html">Home</a>
      <a href="about.html"     class="nav-link" data-page="about.html">About Us</a>
      <a href="ourwork.html"   class="nav-link" data-page="ourwork.html">Our Work</a>
      <a href="regions.html"   class="nav-link" data-page="regions.html">Regions</a>
      <a href="resources.html" class="nav-link" data-page="resources.html">Resources &amp; News</a>
      <a href="contact.html"   class="nav-link" data-page="contact.html">Contact Us</a>
    </nav>

    <!--
      FIX 1: was class="menu-toggle"
              must be  class="hamburger-btn"
              components.js: qs('.hamburger-btn') — previous class caused a null lookup
    -->
    <button
      class="hamburger-btn"
      aria-expanded="false"
      aria-controls="mobile-drawer"
      aria-label="Toggle navigation menu"
    >
      <span class="sr-only">Menu</span>
      <!--
        FIX 2: SVG line classes updated to match components.css:
          .hamburger-btn[aria-expanded="true"] .hamburger-line--top  { rotate  45deg }
          .hamburger-btn[aria-expanded="true"] .hamburger-line--mid  { opacity 0     }
          .hamburger-btn[aria-expanded="true"] .hamburger-line--bottom{ rotate -45deg }
      -->
      <svg
        class="hamburger-icon"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
        focusable="false"
      >
        <line class="hamburger-line hamburger-line--top"    x1="4" y1="6"  x2="20" y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line class="hamburger-line hamburger-line--mid"    x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line class="hamburger-line hamburger-line--bottom" x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

  </div>

  <!-- Mobile Drawer -->
  <div
    id="mobile-drawer"
    class="mobile-drawer"
    aria-hidden="true"
    role="region"
    aria-label="Mobile navigation"
  >
    <nav aria-label="Mobile navigation links">
      <a href="index.html"     class="mobile-nav-link" data-page="index.html">
        Home <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="about.html"     class="mobile-nav-link" data-page="about.html">
        About Us <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="ourwork.html"   class="mobile-nav-link" data-page="ourwork.html">
        Our Work <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="regions.html"   class="mobile-nav-link" data-page="regions.html">
        Regions <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="resources.html" class="mobile-nav-link" data-page="resources.html">
        Resources &amp; News <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="contact.html"   class="mobile-nav-link" data-page="contact.html">
        Contact Us <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
    </nav>
  </div>

</header>
