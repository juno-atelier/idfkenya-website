<!-- ═══════════════════════════════════════════
     components/navbar.html — IDF Kenya Premium Redesign
     Maintains 100% structural compatibility with components.js
═══════════════════════════════════════════ -->

<header id="site-header" class="site-header" role="banner">
  <div class="nav-inner container">

    <!-- Logo -->
    <a href="index.html" class="logo logo--has-image" aria-label="IDF Kenya — Home">
      <picture class="logo__picture">
        <img
          src="assets/images/idf-logo.svg"
          alt="IDF Kenya Logo"
          class="logo__img"
          width="180"
          height="54"
          loading="eager"
          decoding="async"
          draggable="false"
        />
      </picture>
      <div class="logo__text">
        <span class="logo__primary">IDF</span>
        <span class="logo__full">Integrated Development Facility</span>
        <span class="logo__tagline">Kenya</span>
      </div>
      <!-- Shown only when the logo image fails to load -->
      <span class="logo__fallback" aria-hidden="true">
        <span class="logo__fallback-primary">IDF <span class="logo__accent">Kenya</span></span>
        <span class="logo__fallback-tag">Integrated Development Facility</span>
      </span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav" aria-label="Main navigation">
      <ul class="desktop-nav__list">
        <li><a href="index.html"     class="nav-link" data-page="index.html">Home</a></li>
        <li><a href="about.html"     class="nav-link" data-page="about.html">About Us</a></li>
        <li><a href="ourwork.html"   class="nav-link" data-page="ourwork.html">Our Work</a></li>
        <li><a href="regions.html"   class="nav-link" data-page="regions.html">Regions</a></li>
        <li><a href="resources.html" class="nav-link" data-page="resources.html">Resources &amp; News</a></li>
        <li><a href="contact.html"   class="nav-link" data-page="contact.html">Contact Us</a></li>
      </ul>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button
      class="hamburger-btn"
      aria-expanded="false"
      aria-controls="mobile-drawer"
      aria-label="Toggle navigation menu"
    >
      <span class="sr-only">Menu</span>
      <svg
        class="hamburger-icon"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
        focusable="false"
      >
        <line class="hamburger-line hamburger-line--top"    x1="3" y1="7"  x2="21" y2="7"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line class="hamburger-line hamburger-line--mid"    x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line class="hamburger-line hamburger-line--bottom" x1="3" y1="17" x2="21" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

  </div>

  <!-- Mobile Drawer -->
  <div
    id="mobile-drawer"
    class="mobile-drawer"
    aria-hidden="true"
    role="region"
    aria-label="Mobile navigation"
  >
    <nav class="mobile-nav-container" aria-label="Mobile navigation links">
      <a href="index.html"     class="mobile-nav-link" data-page="index.html">
        <span class="mobile-nav-text">Home</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="about.html"     class="mobile-nav-link" data-page="about.html">
        <span class="mobile-nav-text">About Us</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="ourwork.html"   class="mobile-nav-link" data-page="ourwork.html">
        <span class="mobile-nav-text">Our Work</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="regions.html"   class="mobile-nav-link" data-page="regions.html">
        <span class="mobile-nav-text">Regions</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="resources.html" class="mobile-nav-link" data-page="resources.html">
        <span class="mobile-nav-text">Resources &amp; News</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
      <a href="contact.html"   class="mobile-nav-link" data-page="contact.html">
        <span class="mobile-nav-text">Contact Us</span>
        <span class="mobile-nav-dot" aria-hidden="true"></span>
      </a>
    </nav>
  </div>
</header>
